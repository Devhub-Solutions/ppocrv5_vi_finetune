Global:
  debug: false
  use_gpu: false
  epoch_num: 1
  log_smooth_window: 20
  print_batch_step: 10
  save_model_dir: /home/ubuntu/ppocrv5_vi_finetune/finetuned_models/rec/rec_model
  save_epoch_step: 10
  eval_batch_step:
  - 0
  - 2
  cal_metric_during_train: true
  pretrained_model: null
  checkpoints: null
  save_inference_dir: /home/ubuntu/ppocrv5_vi_finetune/finetuned_models/rec/rec_inference
  use_visualdl: true
  infer_img: null
  character_dict_path: /home/ubuntu/ppocrv5_vi_finetune/vietnamese_dict.txt
  max_text_length: 50
  infer_mode: false
  use_space_char: true
Optimizer:
  name: Adam
  beta1: 0.9
  beta2: 0.999
  lr:
    learning_rate: 0.0005
  regularizer:
    name: L2
    factor: 2.0e-05
Architecture:
  model_type: rec
  algorithm: SVTR_LCNet
  Transform: null
  Backbone:
    name: PPLCNetV3
    scale: 0.5
  Neck:
    name: SequenceEncoder
    encoder_type: svtr
    dims: 64
    depth: 2
    hidden_dims: 120
    use_guide: true
  Head:
    name: CTCHead
    fc_decay: 1.0e-05
Loss:
  name: CTCLoss
PostProcess:
  name: CTCLabelDecode
  character_dict_path: /home/ubuntu/ppocrv5_vi_finetune/vietnamese_dict.txt
  use_space_char: true
Metric:
  name: RecMetric
  main_indicator: acc
  is_filter: true
Train:
  dataset:
    name: SimpleDataSet
    data_dir: ./
    label_file_list:
    - /home/ubuntu/ppocrv5_vi_finetune/finetuned_models/rec/data/train.txt
    transforms:
    - DecodeImage:
        img_mode: BGR
        channel_first: false
    - CTCLabelEncode: null
    - RecResizeImg:
        image_shape:
        - 3
        - 48
        - 320
    - KeepKeys:
        keep_keys:
        - image
        - label
        - length
  loader:
    shuffle: true
    batch_size_per_card: 4
    drop_last: true
    num_workers: 0
Eval:
  dataset:
    name: SimpleDataSet
    data_dir: ./
    label_file_list:
    - /home/ubuntu/ppocrv5_vi_finetune/finetuned_models/rec/data/val.txt
    transforms:
    - DecodeImage:
        img_mode: BGR
        channel_first: false
    - CTCLabelEncode: null
    - RecResizeImg:
        image_shape:
        - 3
        - 48
        - 320
    - KeepKeys:
        keep_keys:
        - image
        - label
        - length
  loader:
    shuffle: false
    drop_last: false
    batch_size_per_card: 4
    num_workers: 0
profiler_options: null
